<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda Fix Lab</title>
<style>
  :root{
    --bg: #0c0e0d;
    --bg-panel: #141715;
    --line: #2a2e2b;
    --orange: #ff7a1a;
    --green: #6ee7a0;
    --text: #eef0ee;
    --text-dim: #9aa39c;
    --mono: 'JetBrains Mono', monospace;
    --display: 'Space Grotesk', sans-serif;
  }
  
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    background: var(--bg);
    color: var(--text);
    font-family: var(--display);
    min-height: 100vh;
  }
  
  .wrap{ max-width: 1080px; margin: 0 auto; padding: 0 24px; }
  
  header{
    border-bottom: 1px solid var(--line);
    padding: 20px 0;
    position: sticky; top: 0; z-index: 50;
    background: rgba(12,14,13,0.95);
    backdrop-filter: blur(10px);
  }
  
  .header-content{
    display: flex; justify-content: space-between; align-items: center;
  }
  
  .logo{
    font-family: var(--mono); font-weight: 600; font-size: 18px;
  }
  .logo .lab{ color: var(--orange); }
  
  .nav-top{ display: flex; gap: 20px; align-items: center; }
  .nav-top a{ color: var(--text-dim); text-decoration: none; font-size: 14px; }
  .nav-top a:hover{ color: var(--text); }
  
  .cart-icon{
    position: relative; cursor: pointer;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    font-size: 18px;
  }
  .cart-count{
    position: absolute; top: -8px; right: -8px;
    background: var(--orange);
    color: #000;
    width: 20px; height: 20px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: bold;
  }
  
  main{ padding: 40px 0; }
  
  .page-title{
    font-size: 32px; margin-bottom: 30px;
  }
  
  .products-grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
  }
  
  .product-card{
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px;
    transition: border-color 0.2s;
  }
  .product-card:hover{ border-color: var(--orange); }
  
  .product-img{
    width: 100%;
    height: 180px;
    background: #1a1f1c;
    border-radius: 8px;
    margin-bottom: 12px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim);
    font-size: 14px;
  }
  
  .product-name{
    font-weight: 600; margin-bottom: 6px; font-size: 15px;
  }
  .product-compat{
    font-size: 12px; color: var(--text-dim); margin-bottom: 8px;
  }
  .product-price{
    color: var(--orange); font-weight: 600; margin-bottom: 12px; font-size: 18px;
  }
  .product-stock{
    font-size: 12px; color: var(--text-dim); margin-bottom: 12px;
  }
  
  .qty-box{
    display: flex; gap: 8px; margin-bottom: 12px;
  }
  .qty-input{
    flex: 1;
    background: #1a1f1c;
    border: 1px solid var(--line);
    border-radius: 6px;
    color: var(--text);
    padding: 8px;
    text-align: center;
  }
  
  .btn-add{
    flex: 1;
    background: var(--green);
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 13px;
  }
  .btn-add:hover{ opacity: 0.9; }
  .btn-add:disabled{ opacity: 0.5; cursor: not-allowed; }
  
  /* CARRITO */
  .cart-panel{
    position: fixed;
    right: 0; top: 0; width: 380px; height: 100vh;
    background: var(--bg-panel);
    border-left: 1px solid var(--line);
    z-index: 100;
    transform: translateX(100%);
    transition: transform 0.3s;
    overflow-y: auto;
    padding: 20px;
    display: flex; flex-direction: column;
  }
  .cart-panel.open{ transform: translateX(0); }
  
  .cart-header{
    display: flex; justify-content: space-between; align-items: center;
    padding-bottom: 16px; margin-bottom: 16px;
    border-bottom: 1px solid var(--line);
  }
  .cart-header h2{ font-size: 20px; }
  .close-btn{ background: none; border: none; color: var(--text); cursor: pointer; font-size: 24px; }
  
  .cart-items{ flex: 1; }
  .cart-item{
    padding: 12px; margin-bottom: 12px;
    background: var(--bg);
    border-radius: 8px;
    font-size: 13px;
  }
  .cart-item-name{ font-weight: 600; margin-bottom: 4px; }
  .cart-item-price{ color: var(--orange); margin-bottom: 6px; }
  .cart-item-qty{ color: var(--text-dim); margin-bottom: 8px; }
  .cart-item-remove{ color: #e53e3e; cursor: pointer; font-size: 12px; }
  
  .cart-empty{
    text-align: center; color: var(--text-dim); padding: 40px 20px;
  }
  
  .cart-footer{
    border-top: 1px solid var(--line);
    padding-top: 16px;
    margin-top: 16px;
  }
  .cart-total{
    display: flex; justify-content: space-between;
    font-size: 18px; font-weight: 600;
    margin-bottom: 16px;
  }
  
  .btn-checkout{
    width: 100%;
    background: var(--orange);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 14px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  .btn-checkout:hover{ opacity: 0.9; }
  .btn-checkout:disabled{ opacity: 0.5; cursor: not-allowed; }
  
  .overlay{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 99;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .overlay.active{ opacity: 1; pointer-events: auto; }
  
  .notification{
    position: fixed;
    bottom: 20px; right: 20px;
    background: var(--green);
    color: #000;
    padding: 14px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    animation: slideIn 0.3s;
    z-index: 101;
  }
  @keyframes slideIn{
    from{ transform: translateX(400px); }
    to{ transform: translateX(0); }
  }
  
  @media (max-width: 768px){
    .cart-panel{ width: 100%; }
  }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="header-content">
      <div class="logo">FIX<span class="lab">LAB</span> Tienda</div>
      <div class="nav-top">
        <a href="/">← Volver al inicio</a>
        <div class="cart-icon" id="cartBtn">
          🛒
          <div class="cart-count" id="cartCount" style="display: none;">0</div>
        </div>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="wrap">
    <h1 class="page-title">Catálogo de accesorios</h1>
    <div class="products-grid" id="productsGrid"></div>
  </div>
</main>

<div class="overlay" id="overlay"></div>

<div class="cart-panel" id="cartPanel">
  <div class="cart-header">
    <h2>Tu carrito</h2>
    <button class="close-btn" id="closeCart">✕</button>
  </div>
  
  <div class="cart-items" id="cartItems">
    <div class="cart-empty">Tu carrito está vacío</div>
  </div>
  
  <div class="cart-footer">
    <div class="cart-total">
      <span>Total:</span>
      <span id="cartTotal">$0</span>
    </div>
    <button class="btn-checkout" id="checkoutBtn" disabled>Pagar con MercadoPago</button>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://gtfexxsbfprxqdbjlfjy.supabase.co";
  const SUPABASE_KEY = "sb_publishable_ALou-nprG8wRyhw9fri4_g_rITe6-bx";
  
  let cart = [];
  let products = [];
  
  async function cargarProductos() {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/productos?select=*`, {
        headers: { apikey: SUPABASE_KEY }
      });
      products = await res.json();
      mostrarProductos();
    } catch (e) {
      console.error("Error cargando productos:", e);
      document.getElementById('productsGrid').innerHTML = '<p style="grid-column: 1/-1;">Error al cargar productos. Intenta recargar la página.</p>';
    }
  }
  
  function mostrarProductos() {
    const grid = document.getElementById('productsGrid');
    grid.innerHTML = '';
    
    products.forEach(p => {
      const card = document.createElement('div');
      card.className = 'product-card';
      const disponible = p.cantidad > 0;
      card.innerHTML = `
        <div class="product-img">${p.compatible_con || 'Accesorio'}</div>
        <div class="product-name">${p.nombre}</div>
        <div class="product-compat">${p.categoria}</div>
        <div class="product-price">$${p.precio_venta}</div>
        <div class="product-stock">${disponible ? `${p.cantidad} disponibles` : 'Sin stock'}</div>
        <div class="qty-box">
          <input type="number" class="qty-input" value="1" min="1" max="${p.cantidad}" ${!disponible ? 'disabled' : ''}>
          <button class="btn-add" data-id="${p.id}" ${!disponible ? 'disabled' : ''}>Agregar</button>
        </div>
      `;
      grid.appendChild(card);
      
      if (disponible) {
        card.querySelector('.btn-add').addEventListener('click', () => agregarAlCarrito(p, card));
      }
    });
  }
  
  function agregarAlCarrito(producto, card) {
    const qty = parseInt(card.querySelector('.qty-input').value);
    const existente = cart.find(item => item.id === producto.id);
    
    if (existente) {
      existente.cantidad += qty;
    } else {
      cart.push({ id: producto.id, nombre: producto.nombre, precio: producto.precio_venta, cantidad: qty });
    }
    
    actualizarCarrito();
    mostrarNotificacion(`${producto.nombre} agregado al carrito`);
  }
  
  function actualizarCarrito() {
    const count = cart.reduce((a, item) => a + item.cantidad, 0);
    const total = cart.reduce((a, item) => a + (item.precio * item.cantidad), 0);
    
    document.getElementById('cartCount').style.display = count > 0 ? 'flex' : 'none';
    document.getElementById('cartCount').textContent = count;
    document.getElementById('cartTotal').textContent = `$${total.toLocaleString('es-AR')}`;
    
    const cartItems = document.getElementById('cartItems');
    if (cart.length === 0) {
      cartItems.innerHTML = '<div class="cart-empty">Tu carrito está vacío</div>';
      document.getElementById('checkoutBtn').disabled = true;
      return;
    }
    
    document.getElementById('checkoutBtn').disabled = false;
    cartItems.innerHTML = cart.map(item => `
      <div class="cart-item">
        <div class="cart-item-name">${item.nombre}</div>
        <div class="cart-item-price">$${item.precio}</div>
        <div class="cart-item-qty">Cantidad: ${item.cantidad}</div>
        <div class="cart-item-remove" onclick="eliminarDelCarrito(${item.id})">Eliminar</div>
      </div>
    `).join('');
  }
  
  function eliminarDelCarrito(id) {
    cart = cart.filter(item => item.id !== id);
    actualizarCarrito();
  }
  
  async function checkout() {
    if (cart.length === 0) return;
    
    document.getElementById('checkoutBtn').disabled = true;
    document.getElementById('checkoutBtn').textContent = 'Procesando...';
    
    try {
      const res = await fetch('/api/create-preference', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ items: cart })
      });
      
      const data = await res.json();
      if (data.init_point) {
        window.location.href = data.init_point;
      } else {
        alert('Error al procesar el pago. Intenta nuevamente.');
        document.getElementById('checkoutBtn').disabled = false;
        document.getElementById('checkoutBtn').textContent = 'Pagar con MercadoPago';
      }
    } catch (e) {
      console.error(e);
      alert('Error de conexión. Intenta nuevamente.');
      document.getElementById('checkoutBtn').disabled = false;
      document.getElementById('checkoutBtn').textContent = 'Pagar con MercadoPago';
    }
  }
  
  function mostrarNotificacion(msg) {
    const notif = document.createElement('div');
    notif.className = 'notification';
    notif.textContent = msg;
    document.body.appendChild(notif);
    setTimeout(() => notif.remove(), 2000);
  }
  
  // Eventos
  document.getElementById('cartBtn').addEventListener('click', () => {
    document.getElementById('cartPanel').classList.add('open');
    document.getElementById('overlay').classList.add('active');
  });
  
  document.getElementById('closeCart').addEventListener('click', () => {
    document.getElementById('cartPanel').classList.remove('open');
    document.getElementById('overlay').classList.remove('active');
  });
  
  document.getElementById('overlay').addEventListener('click', () => {
    document.getElementById('cartPanel').classList.remove('open');
    document.getElementById('overlay').classList.remove('active');
  });
  
  document.getElementById('checkoutBtn').addEventListener('click', checkout);
  
  // Check pago status
  const params = new URLSearchParams(window.location.search);
  if (params.get('pago') === 'ok') {
    mostrarNotificacion('¡Pago realizado! Gracias por tu compra.');
    cart = [];
    actualizarCarrito();
  }
  
  cargarProductos();
</script>

</body>
</html>
